name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET Framework 3.5
      run: |
        choco install netfx-3.5-sp1 -y
        echo "C:\Windows\Microsoft.NET\Framework\v3.5" | Out-File -FilePath $env:GITHUB_PATH -Append

    - name: Run Build.cmd
      run: |
        cd Build
        .\build.cmd

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        name: ConfuserEx Custom Build ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          Build\ConfuserEx_bin.zip